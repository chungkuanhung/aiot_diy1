<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Info</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .name-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .name-container::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 3px;
        }

        .name-zh {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .name-en {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #cbd5e1;
        }

        .time-container {
            margin-top: 2.5rem;
        }

        .time-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .time-display {
            font-size: 3.5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .date-display {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-top: 0.5rem;
            font-weight: 300;
        }

        /* ===== Responsive Design (RWD) ===== */
        @media (max-width: 768px) {
            .glass-card {
                padding: 2.5rem 3rem;
                width: 85%;
            }

            .name-zh {
                font-size: 2.8rem;
            }

            .time-display {
                font-size: 3rem;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 2rem;
                width: 95%;
            }

            .name-zh {
                font-size: 2.2rem;
            }

            .name-en {
                font-size: 1rem;
            }

            .time-display {
                font-size: 2.2rem;
            }

            .date-display {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <div class="name-container">
            <h1 class="name-zh">鍾冠泓</h1>
            <h2 class="name-en">KUAN HUNG CHUNG</h2>
        </div>

        <div class="time-container">
            <div class="time-label">Current Time</div>
            <div class="time-display" id="time">00:00:00</div>
            <div class="date-display" id="date">Loading...</div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();

            // Format time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-TW', options);
        }

        // Update immediately, then every second
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
